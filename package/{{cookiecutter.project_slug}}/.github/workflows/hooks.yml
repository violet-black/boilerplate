name: pre-commit

on:
  pull_request:
  push:
    branches: [ master ]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: 3
      - uses: pre-commit/action@v2.0.3
        with:
          extra_args: -c .pre-commit-config-ci.yaml
